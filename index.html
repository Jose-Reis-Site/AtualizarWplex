<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Planilha web - Programacao</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #18212f;
      --muted: #667085;
      --line: #d8dee8;
      --line-soft: #edf0f5;
      --brand: #0f766e;
      --brand-dark: #115e59;
      --accent: #b45309;
      --danger: #b42318;
      --shadow: 0 18px 45px rgba(24, 33, 47, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
    }

    header {
      background: #173b45;
      color: #fff;
      padding: 18px clamp(16px, 4vw, 40px);
      border-bottom: 4px solid var(--brand);
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(22px, 4vw, 34px);
      font-weight: 800;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: rgba(255, 255, 255, 0.78);
      max-width: 920px;
      line-height: 1.45;
    }

    main {
      width: min(1500px, calc(100% - 28px));
      margin: 18px auto 34px;
    }

    .toolbar,
    .statusbar,
    .table-wrap {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .toolbar {
      padding: 16px;
      display: grid;
      gap: 14px;
    }

    .source-row {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) minmax(220px, 1fr) auto auto;
      gap: 10px;
      align-items: end;
    }

    .filters {
      display: grid;
      grid-template-columns: 1.6fr repeat(3, minmax(150px, 1fr)) minmax(140px, 0.7fr);
      gap: 10px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    input,
    select,
    button {
      min-height: 40px;
      border-radius: 6px;
      border: 1px solid var(--line);
      font: inherit;
    }

    input,
    select {
      width: 100%;
      padding: 0 11px;
      background: #fff;
      color: var(--ink);
    }

    button {
      padding: 0 14px;
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover {
      background: var(--brand-dark);
      border-color: var(--brand-dark);
    }

    button.secondary {
      background: #fff;
      color: var(--brand-dark);
      border-color: #9ccac5;
    }

    button.secondary:hover {
      background: #e9f5f3;
    }

    button.small {
      min-height: 32px;
      padding: 0 12px;
      font-size: 12px;
    }

    .statusbar {
      margin: 12px 0;
      padding: 11px 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      border: 1px solid var(--line);
      background: #f9fafb;
      border-radius: 999px;
      padding: 7px 10px;
      color: var(--muted);
      font-weight: 700;
    }

    .chip strong {
      color: var(--ink);
    }

    .pager {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pager button {
      min-height: 34px;
      padding: 0 10px;
    }

    .table-wrap {
      overflow: auto;
      max-height: calc(100vh - 255px);
    }

    table {
      border-collapse: separate;
      border-spacing: 0;
      width: 100%;
      min-width: 1180px;
      font-size: 13px;
    }

    th,
    td {
      padding: 8px 10px;
      border-right: 1px solid var(--line-soft);
      border-bottom: 1px solid var(--line-soft);
      text-align: left;
      vertical-align: middle;
      white-space: nowrap;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #e8edf3;
      color: #293548;
      font-size: 12px;
      text-transform: uppercase;
      cursor: pointer;
      user-select: none;
    }

    tr:nth-child(even) td {
      background: #fbfcfd;
    }

    tr:hover td {
      background: #eef8f6;
    }

    td.activity {
      font-weight: 800;
    }

    td.driver-cell {
      color: var(--brand-dark);
      font-weight: 800;
    }

    td.time {
      font-variant-numeric: tabular-nums;
      font-weight: 700;
    }

    .source-row.advanced {
      padding-top: 4px;
      border-top: 1px solid var(--line-soft);
    }

    .service-code {
      font-weight: 800;
      color: #263544;
    }

    .tag {
      display: inline-flex;
      min-width: 30px;
      justify-content: center;
      border-radius: 999px;
      padding: 3px 8px;
      background: #e9f5f3;
      color: var(--brand-dark);
      font-weight: 800;
    }

    .tag.alt {
      background: #fff4e5;
      color: var(--accent);
    }

    .message {
      padding: 22px;
      color: var(--muted);
      line-height: 1.5;
    }

    .message.error {
      color: var(--danger);
      background: #fff2f0;
    }

    dialog {
      width: min(440px, calc(100% - 28px));
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0;
      box-shadow: 0 24px 70px rgba(24, 33, 47, 0.22);
    }

    dialog::backdrop {
      background: rgba(18, 52, 59, 0.42);
    }

    .modal-head,
    .modal-body,
    .modal-actions {
      padding: 16px;
    }

    .modal-head {
      border-bottom: 1px solid var(--line-soft);
    }

    .modal-head h2 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0;
    }

    .modal-body {
      display: grid;
      gap: 12px;
    }

    .record-summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .record-summary strong {
      color: var(--ink);
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      border-top: 1px solid var(--line-soft);
    }

    @media (max-width: 980px) {
      .source-row,
      .filters {
        grid-template-columns: 1fr;
      }

      .statusbar {
        align-items: stretch;
      }

      .pager {
        width: 100%;
        justify-content: space-between;
      }

      .table-wrap {
        max-height: calc(100vh - 430px);
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Escala Wplex</h1>
    <p class="subtitle">Busca por data, linha e tabela com edicao direta da matricula na planilha base.</p>
  </header>

  <main>
    <section class="toolbar" aria-label="Controles da planilha">
      <div class="filters">
        <label>
          Busca livre
          <input id="searchInput" type="search" placeholder="Servico, carro, matricula, local...">
        </label>
        <label>
          Data
          <input id="dateFilter" type="date">
        </label>
        <label>
          Linha
          <select id="lineFilter"></select>
        </label>
        <label>
          Tabela
          <select id="tableFilter"></select>
        </label>
        <label>
          Registros por pagina
          <select id="pageSize">
            <option>100</option>
            <option selected>200</option>
            <option>500</option>
            <option>1000</option>
          </select>
        </label>
      </div>

      <div class="source-row advanced" hidden>
        <label>
          URL do Web App
          <input id="apiUrl" type="url" spellcheck="false" placeholder="Cole aqui a URL do Apps Script">
        </label>
        <label>
          URL do CSV alternativo
          <input id="csvUrl" type="url" spellcheck="false">
        </label>
        <button id="reloadBtn" type="button">Atualizar dados</button>
        <button id="exportBtn" type="button" class="secondary">Exportar filtrado</button>
      </div>
    </section>

    <section class="statusbar" aria-live="polite">
      <div class="chips">
        <span class="chip">Total: <strong id="totalRows">0</strong></span>
        <span class="chip">Filtrado: <strong id="filteredRows">0</strong></span>
        <span class="chip">Colunas: <strong id="totalColumns">0</strong></span>
        <span class="chip">Salvamento: <strong id="saveMode">CSV</strong></span>
      </div>
      <div class="pager">
        <button id="prevPage" type="button" class="secondary">Anterior</button>
        <span id="pageInfo">Pagina 0 de 0</span>
        <button id="nextPage" type="button" class="secondary">Proxima</button>
      </div>
    </section>

    <section class="table-wrap">
      <div id="message" class="message">Carregando dados...</div>
      <table id="dataTable" hidden>
        <thead></thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <dialog id="editDialog">
    <form method="dialog">
      <div class="modal-head">
        <h2>Trocar matricula</h2>
      </div>
      <div class="modal-body">
        <div class="record-summary">
          <span>Linha: <strong id="editLine">-</strong></span>
          <span>Carro: <strong id="editCar">-</strong></span>
          <span>Servico: <strong id="editService">-</strong></span>
          <span>Registro: <strong id="editRow">-</strong></span>
        </div>
        <label>
          Nova matricula
          <input id="driverInput" type="text" inputmode="numeric" maxlength="20" autocomplete="off">
        </label>
        <div id="editMessage" class="message" hidden></div>
      </div>
      <div class="modal-actions">
        <button id="cancelEdit" type="button" class="secondary">Cancelar</button>
        <button id="saveDriver" type="button">Salvar matricula</button>
      </div>
    </form>
  </dialog>

  <script>
    const DEFAULT_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS4odiCG64QbgNSla-P0oPnwUOpbmLg1GFdl07lCD-9rR8zd7FYllTnlJQm5115TxVtA9MjEh_O7RpU/pub?gid=1235803740&single=true&output=csv';
    const DEFAULT_API_URL = 'https://script.google.com/macros/s/AKfycbzJ1fI2lHr_LeLFGFqV5Y8Ciwdgk4ZHYfXbXPYgovGzOO6IZN4LRQQTnh88RHArgtta/exec';
    const DRIVER_COLUMN_INDEX = 26;
    const VISIBLE_COLUMN_INDEXES = [2, 4, 6, 8, 9, 18, 19, 20, 21, 22, 23, 25, 26];
    const DAY_TYPE_LABELS = {
      U: 'Util',
      S: 'Sabado',
      D: 'Domingo',
      F: 'Feriado'
    };

    const COLUMN_NAMES = [
      'Empresa',
      'Filial',
      'Servico',
      'Tipo',
      'Linha',
      'Turno',
      'Tabela',
      'Campo 8',
      'Inicio jornada',
      'Fim jornada',
      'Regime',
      'Vira dia',
      'Local base',
      'Campo 14',
      'Extra 1',
      'Extra 2',
      'Extra 3',
      'Campo 18',
      'Sentido',
      'Sequencia',
      'Atividade',
      'Inicio',
      'Fim',
      'Local',
      'Campo 25',
      'Carro',
      'Motorista',
      'Campo 28',
      'Campo 29',
      'Campo 30'
    ];

    const state = {
      rows: [],
      filtered: [],
      columns: [],
      page: 1,
      sortColumn: null,
      sortDirection: 'asc',
      editingRow: null
    };

    const els = {
      csvUrl: document.querySelector('#csvUrl'),
      apiUrl: document.querySelector('#apiUrl'),
      reloadBtn: document.querySelector('#reloadBtn'),
      exportBtn: document.querySelector('#exportBtn'),
      searchInput: document.querySelector('#searchInput'),
      dateFilter: document.querySelector('#dateFilter'),
      lineFilter: document.querySelector('#lineFilter'),
      tableFilter: document.querySelector('#tableFilter'),
      pageSize: document.querySelector('#pageSize'),
      totalRows: document.querySelector('#totalRows'),
      filteredRows: document.querySelector('#filteredRows'),
      totalColumns: document.querySelector('#totalColumns'),
      saveMode: document.querySelector('#saveMode'),
      pageInfo: document.querySelector('#pageInfo'),
      prevPage: document.querySelector('#prevPage'),
      nextPage: document.querySelector('#nextPage'),
      message: document.querySelector('#message'),
      table: document.querySelector('#dataTable'),
      thead: document.querySelector('#dataTable thead'),
      tbody: document.querySelector('#dataTable tbody'),
      editDialog: document.querySelector('#editDialog'),
      editLine: document.querySelector('#editLine'),
      editCar: document.querySelector('#editCar'),
      editService: document.querySelector('#editService'),
      editRow: document.querySelector('#editRow'),
      driverInput: document.querySelector('#driverInput'),
      editMessage: document.querySelector('#editMessage'),
      cancelEdit: document.querySelector('#cancelEdit'),
      saveDriver: document.querySelector('#saveDriver')
    };

    els.csvUrl.value = DEFAULT_CSV_URL;
    els.apiUrl.value = localStorage.getItem('wplexApiUrl') || DEFAULT_API_URL;

    function parseRows(text) {
      return text
        .replace(/^\uFEFF/, '')
        .split(/\r?\n/)
        .map(line => line.trim())
        .filter(Boolean)
        .map((line, index) => ({
          id: index + 1,
          sheetRow: index + 1,
          values: line.split(';').map(value => value.trim())
        }));
    }

    function normalizeRows(rows) {
      const maxColumns = Math.max(...rows.map(row => row.values.length), COLUMN_NAMES.length);
      state.columns = Array.from({ length: maxColumns }, (_, index) => COLUMN_NAMES[index] || `Campo ${index + 1}`);
      return rows.map(row => ({
        ...row,
        values: Array.from({ length: maxColumns }, (_, index) => row.values[index] || ''),
        service: parseService(row.values[2] || '')
      }));
    }

    async function loadData() {
      showMessage('Carregando dados...');
      els.reloadBtn.disabled = true;

      try {
        const rows = hasApiUrl() ? await loadFromApi() : await loadFromCsv();
        if (!rows.length) {
          throw new Error('A base veio vazia.');
        }

        state.rows = normalizeRows(rows);
        state.page = 1;
        buildFilters();
        applyFilters();
      } catch (error) {
        showMessage(
          'Nao foi possivel carregar os dados. Se a base nao for publica, use a URL do Web App do Apps Script. Detalhe: ' + error.message,
          true
        );
      } finally {
        els.reloadBtn.disabled = false;
      }
    }

    async function loadFromCsv() {
      const response = await fetch(els.csvUrl.value.trim(), { cache: 'no-store' });
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }

      return parseRows(await response.text());
    }

    async function loadFromApi() {
      const response = await fetch(apiUrlWithParams({ action: 'read' }), { cache: 'no-store' });
      const payload = await response.json();
      if (!payload.ok) {
        throw new Error(payload.error || 'Falha no Apps Script.');
      }

      localStorage.setItem('wplexApiUrl', cleanApiUrl());
      return payload.rows.map((row, index) => ({
        id: index + 1,
        sheetRow: Number(row.sheetRow || index + 1),
        values: row.values.map(value => String(value ?? '').trim())
      }));
    }

    function buildFilters() {
      fillSelect(els.lineFilter, state.rows.map(row => row.service.line || row.values[4]), 'Todas');
      refreshTableFilter();
    }

    function fillSelect(select, values, allLabel) {
      const current = select.value;
      const options = [...new Set(values.filter(Boolean))].sort((a, b) => a.localeCompare(b, 'pt-BR', { numeric: true }));
      select.innerHTML = `<option value="">${allLabel}</option>` + options.map(value => `<option>${escapeHtml(value)}</option>`).join('');
      if (options.includes(current)) {
        select.value = current;
      }
    }

    function applyFilters() {
      const term = normalizeText(els.searchInput.value);
      const date = els.dateFilter.value;
      const line = els.lineFilter.value;
      const table = els.tableFilter.value;

      state.filtered = state.rows.filter(row => {
        if (date && row.service.dateIso !== date) return false;
        if (line && (row.service.line || row.values[4]) !== line) return false;
        if (table && row.values[6] !== table) return false;
        if (term && !normalizeText(row.values.join(' ') + ' ' + row.service.dateBr + ' ' + row.service.dayType).includes(term)) return false;
        return true;
      });

      sortRows();
      state.page = Math.min(state.page, totalPages()) || 1;
      render();
    }

    function refreshTableFilter() {
      const current = els.tableFilter.value;
      const date = els.dateFilter.value;
      const line = els.lineFilter.value;
      const rowsForTable = state.rows.filter(row => {
        if (date && row.service.dateIso !== date) return false;
        if (line && (row.service.line || row.values[4]) !== line) return false;
        return true;
      });

      fillSelect(els.tableFilter, rowsForTable.map(row => row.values[6]), 'Todas');
      if (current && [...els.tableFilter.options].some(option => option.value === current)) {
        els.tableFilter.value = current;
      }
    }

    function sortRows() {
      if (state.sortColumn === null) return;
      const multiplier = state.sortDirection === 'asc' ? 1 : -1;
      state.filtered.sort((a, b) => {
        const av = getSortValue(a, state.sortColumn);
        const bv = getSortValue(b, state.sortColumn);
        return av.localeCompare(bv, 'pt-BR', { numeric: true }) * multiplier;
      });
    }

    function getSortValue(row, key) {
      if (key === 'date') return row.service.dateIso || '';
      if (key === 'dayType') return row.service.dayType || '';
      return row.values[Number(key)] || '';
    }

    function render() {
      els.totalRows.textContent = state.rows.length.toLocaleString('pt-BR');
      els.filteredRows.textContent = state.filtered.length.toLocaleString('pt-BR');
      els.totalColumns.textContent = getDisplayColumns().length.toLocaleString('pt-BR');
      els.saveMode.textContent = hasApiUrl() ? 'Web App' : 'CSV';

      if (!state.filtered.length) {
        showMessage('Nenhum registro encontrado para os filtros atuais.');
        return;
      }

      els.message.hidden = true;
      els.table.hidden = false;
      renderHeader();
      renderBody();
      renderPager();
    }

    function renderHeader() {
      const headers = [
        { label: '#', key: '' },
        { label: 'Acao', key: '' },
        ...getDisplayColumns()
      ];
      els.thead.innerHTML = `<tr>${headers.map(column => {
        const marker = String(column.key) === String(state.sortColumn) ? (state.sortDirection === 'asc' ? ' ^' : ' v') : '';
        return `<th data-column="${escapeHtml(column.key)}">${escapeHtml(column.label + marker)}</th>`;
      }).join('')}</tr>`;
    }

    function renderBody() {
      const pageSize = Number(els.pageSize.value);
      const start = (state.page - 1) * pageSize;
      const visibleRows = state.filtered.slice(start, start + pageSize);
      const displayColumns = getDisplayColumns();

      els.tbody.innerHTML = visibleRows.map(row => {
        const cells = displayColumns.map(column => {
          const value = column.get(row);
          const classes = [
            column.time ? 'time' : '',
            column.index === 20 ? 'activity' : '',
            column.index === DRIVER_COLUMN_INDEX ? 'driver-cell' : ''
          ].filter(Boolean).join(' ');
          return `<td class="${classes}">${formatCell(value, column)}</td>`;
        }).join('');
        return `<tr><td>${row.id}</td><td><button class="small secondary" type="button" data-edit-row="${row.id}">Editar</button></td>${cells}</tr>`;
      }).join('');
    }

    function getDisplayColumns() {
      const baseColumns = VISIBLE_COLUMN_INDEXES.map(index => ({
        key: String(index),
        index,
        label: index === DRIVER_COLUMN_INDEX ? 'Matricula' : state.columns[index],
        time: [8, 9, 21, 22].includes(index),
        get: row => row.values[index] || ''
      }));

      return [
        baseColumns[0],
        { key: 'date', label: 'Data', time: true, get: row => row.service.dateBr || '' },
        { key: 'dayType', label: 'Dia', get: row => row.service.dayType || '' },
        ...baseColumns.slice(1)
      ];
    }

    function renderPager() {
      const pages = totalPages();
      els.pageInfo.textContent = `Pagina ${state.page} de ${pages}`;
      els.prevPage.disabled = state.page <= 1;
      els.nextPage.disabled = state.page >= pages;
    }

    function totalPages() {
      return Math.max(1, Math.ceil(state.filtered.length / Number(els.pageSize.value)));
    }

    function formatCell(value, column) {
      const safe = escapeHtml(value);
      if (column.index === 2 && value) {
        return `<span class="service-code">${safe}</span>`;
      }
      if (column.index === 18 && value) {
        return `<span class="tag ${value === 'V' ? 'alt' : ''}">${safe}</span>`;
      }
      return safe;
    }

    function showMessage(text, isError = false) {
      els.table.hidden = true;
      els.message.hidden = false;
      els.message.className = isError ? 'message error' : 'message';
      els.message.textContent = text;
      els.saveMode.textContent = hasApiUrl() ? 'Web App' : 'CSV';
      renderPager();
    }

    function openEdit(rowId) {
      const row = state.rows.find(item => item.id === Number(rowId));
      if (!row) return;

      state.editingRow = row;
      els.editLine.textContent = row.service.line || row.values[4] || '-';
      els.editCar.textContent = row.values[25] || '-';
      els.editService.textContent = row.service.dateBr ? `${row.values[2]} - ${row.service.dateBr}` : row.values[2] || '-';
      els.editRow.textContent = row.sheetRow || row.id;
      els.driverInput.value = row.values[DRIVER_COLUMN_INDEX] || '';
      els.editMessage.hidden = true;
      els.editMessage.textContent = '';
      els.editMessage.className = 'message';
      els.editDialog.showModal();
      els.driverInput.focus();
      els.driverInput.select();
    }

    async function saveDriver() {
      if (!state.editingRow) return;
      if (!hasApiUrl()) {
        showEditMessage('Para salvar na planilha base, cole primeiro a URL do Web App do Apps Script.', true);
        return;
      }

      const driver = els.driverInput.value.trim();
      if (!driver) {
        showEditMessage('Informe a nova matricula.', true);
        return;
      }

      els.saveDriver.disabled = true;
      showEditMessage('Salvando...', false);

      try {
        const payload = {
          action: 'updateDriver',
          sheetRow: state.editingRow.sheetRow,
          driver
        };
        const response = await fetch(cleanApiUrl(), {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload)
        });
        const result = await response.json();
        if (!result.ok) {
          throw new Error(result.error || 'Falha ao salvar.');
        }

        state.editingRow.values[DRIVER_COLUMN_INDEX] = driver;
        applyFilters();
        showEditMessage('Matricula salva na planilha.', false);
        setTimeout(() => els.editDialog.close(), 450);
      } catch (error) {
        showEditMessage('Nao foi possivel salvar. Detalhe: ' + error.message, true);
      } finally {
        els.saveDriver.disabled = false;
      }
    }

    function showEditMessage(text, isError) {
      els.editMessage.hidden = false;
      els.editMessage.className = isError ? 'message error' : 'message';
      els.editMessage.textContent = text;
    }

    function exportFiltered() {
      if (!state.filtered.length) return;
      const displayColumns = getDisplayColumns();
      const lines = [
        displayColumns.map(column => column.label).join(';'),
        ...state.filtered.map(row => displayColumns.map(column => csvEscape(column.get(row))).join(';'))
      ];
      const blob = new Blob([lines.join('\r\n')], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'planilha-filtrada.csv';
      link.click();
      URL.revokeObjectURL(url);
    }

    function csvEscape(value) {
      const text = String(value ?? '');
      return /[;"\r\n]/.test(text) ? `"${text.replaceAll('"', '""')}"` : text;
    }

    function hasApiUrl() {
      return cleanApiUrl().length > 0;
    }

    function cleanApiUrl() {
      return els.apiUrl.value.trim();
    }

    function apiUrlWithParams(params) {
      const url = new URL(cleanApiUrl());
      Object.entries(params).forEach(([key, value]) => url.searchParams.set(key, value));
      return url.toString();
    }

    function parseService(service) {
      const text = String(service || '').trim();
      const match = text.match(/^(.+?)([A-Za-z])(\d{6})$/);
      if (!match) {
        return {
          line: '',
          dayCode: '',
          dayType: '',
          dateIso: '',
          dateBr: ''
        };
      }

      const [, line, dayCodeRaw, dateRaw] = match;
      const dayCode = dayCodeRaw.toUpperCase();
      const day = dateRaw.slice(0, 2);
      const month = dateRaw.slice(2, 4);
      const year = '20' + dateRaw.slice(4, 6);

      return {
        line,
        dayCode,
        dayType: DAY_TYPE_LABELS[dayCode] || dayCode,
        dateIso: `${year}-${month}-${day}`,
        dateBr: `${day}/${month}/${year}`
      };
    }

    function normalizeText(value) {
      return String(value)
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .toLowerCase();
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    els.reloadBtn.addEventListener('click', loadData);
    els.exportBtn.addEventListener('click', exportFiltered);
    els.apiUrl.addEventListener('change', () => {
      localStorage.setItem('wplexApiUrl', cleanApiUrl());
      els.saveMode.textContent = hasApiUrl() ? 'Web App' : 'CSV';
    });
    els.searchInput.addEventListener('input', () => {
      state.page = 1;
      applyFilters();
    });
    els.dateFilter.addEventListener('change', () => {
      state.page = 1;
      refreshTableFilter();
      applyFilters();
    });

    els.lineFilter.addEventListener('change', () => {
      state.page = 1;
      refreshTableFilter();
      applyFilters();
    });

    [els.tableFilter, els.pageSize].forEach(element => {
      element.addEventListener('change', () => {
        state.page = 1;
        applyFilters();
      });
    });

    els.prevPage.addEventListener('click', () => {
      state.page = Math.max(1, state.page - 1);
      render();
    });

    els.nextPage.addEventListener('click', () => {
      state.page = Math.min(totalPages(), state.page + 1);
      render();
    });

    els.thead.addEventListener('click', event => {
      const th = event.target.closest('th');
      if (!th) return;
      const column = th.dataset.column;
      if (!column) return;
      if (state.sortColumn === column) {
        state.sortDirection = state.sortDirection === 'asc' ? 'desc' : 'asc';
      } else {
        state.sortColumn = column;
        state.sortDirection = 'asc';
      }
      applyFilters();
    });

    els.tbody.addEventListener('click', event => {
      const button = event.target.closest('[data-edit-row]');
      if (!button) return;
      openEdit(button.dataset.editRow);
    });

    els.cancelEdit.addEventListener('click', () => els.editDialog.close());
    els.saveDriver.addEventListener('click', saveDriver);
    els.driverInput.addEventListener('keydown', event => {
      if (event.key === 'Enter') {
        event.preventDefault();
        saveDriver();
      }
    });

    loadData();
  </script>
</body>
</html>
